name: Check links
on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        id: lychee
        with:
          # 403/429 accepted: arXiv, ACL Anthology, and publisher sites
          # often reject bot traffic while working fine for humans.
          # root-dir resolves root-relative /assets/... image links.
          # ojs.aaai.org excluded: its broken HTTP/2 support fails lychee
          # even though the links work in browsers.
          args: >-
            --no-progress
            --accept '100..=103,200..=299,403,429'
            --root-dir ${{ github.workspace }}/docs
            --exclude 'ojs\.aaai\.org'
            'docs/**/*.md'
          fail: false
      - name: Open issue for broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link checker found broken links
          content-filepath: ./lychee/out.md
          labels: link-rot
