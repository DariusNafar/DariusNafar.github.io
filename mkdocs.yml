site_name: Aliakbar Nafar (Darius)
site_description: Research in NLP, LLMs, and neuro-symbolic reasoning by Darius (CS PhD @ MSU)
site_author: Aliakbar Nafar
site_url: https://www.anafar.me/
copyright: '&copy; 2026 Aliakbar Nafar'

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.ico
  icon:
    logo: material/school
  font:
    text: Inter
    code: Roboto Mono
  palette:
    # Automatic mode follows the OS preference; the toggle cycles auto -> light -> dark.
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy

nav:
  - Home: index.md
  - Research: research.md
  - Publications: publications.md
  - Work Experience: work.md
  - Talks & Presentations: talks.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DariusNafar
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/anafar/
      name: LinkedIn
    - icon: simple/googlescholar
      link: https://scholar.google.com/citations?user=RnsQD44AAAAJ&hl=en
      name: Google Scholar

extra_css:
  - assets/extra.css
extra_javascript:
  - assets/gallery-slider.js

plugins:
  - search
