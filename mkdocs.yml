site_name: Aliakbar Nafar (Darius)
site_description: Research in NLP, LLMs, and neuro-symbolic reasoning by Darius (CS PhD @ MSU)
site_author: Aliakbar Nafar
site_url: https://www.anafar.me/
repo_url: https://github.com/DariusNafar/DariusNafar.github.io
theme:
  name: null
  custom_dir: 'cinder'
  # With name: null, MkDocs never reads cinder/mkdocs_theme.yml, so the
  # theme settings it would provide must be declared here instead.
  static_templates:
    - 404.html
  shortcuts:
    help: 191    # ?
    next: 78     # n
    previous: 80 # p
    search: 83   # s

nav:
  - Home: index.md
  - Research: research.md
  - Publications: publications.md
  - Work Experience: work.md
  - Talks & Presentations: talks.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - def_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DariusNafar
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/anafar/
      name: LinkedIn
    - icon: simple/googlescholar
      link: https://scholar.google.com/citations?user=RnsQD44AAAAJ&hl=en
      name: Google Scholar
  # og:title/description/url and twitter:title/description are emitted
  # per-page by the theme (cinder/base.html); only page-independent tags here.
  meta:
    - property: og:type
      content: website
    - property: og:image
      content: https://www.anafar.me/assets/social-card.png
    - property: og:image:width
      content: "1200"
    - property: og:image:height
      content: "630"
    - name: twitter:card
      content: summary_large_image
    - name: twitter:image
      content: https://www.anafar.me/assets/social-card.png

extra_css:
  - assets/overrides.css
extra_javascript:
  - assets/gallery-slider.js

plugins:
  - search
